<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>國語大冒險 - Chinese Adventure</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  background: linear-gradient(180deg, #e8f4fd 0%, #f0f9ff 50%, #fef9e7 100%);
  overflow-x: hidden;
  overflow-y: auto;
}

#app {
  width: 100%;
  max-width: 500px;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  overflow-y: auto;
}

.screen {
  display: none;
  width: 100%;
  min-height: 100vh;
  padding: 16px;
  padding-bottom: 80px;
  animation: fadeIn 0.3s ease;
}

.screen.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes popIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  margin-bottom: 16px;
}

.header-title {
  font-size: 20px;
  font-weight: 800;
  color: #2d3436;
}

.header-btn {
  background: #e8f0fe;
  border: none;
  color: #2d3436;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}

.header-btn:active {
  transform: scale(0.9);
}

.save-notice {
  text-align: center;
  color: #636e72;
  font-size: 12px;
  margin-bottom: 12px;
}

.stats-bar {
  background: #ffffff;
  border: 2px solid #e8f0fe;
  border-radius: 20px;
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.stat-item {
  text-align: center;
  color: #2d3436;
}

.stat-value {
  font-size: 18px;
  font-weight: bold;
}

.stat-label {
  font-size: 11px;
  color: #636e72;
}

.exp-bar-container {
  background: #ffffff;
  border: 2px solid #e8f0fe;
  border-radius: 20px;
  padding: 12px 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.exp-info {
  display: flex;
  justify-content: space-between;
  color: #2d3436;
  font-size: 13px;
  margin-bottom: 6px;
}

.exp-bar {
  height: 8px;
  background: #e8f0fe;
  border-radius: 4px;
  overflow: hidden;
}

.exp-fill {
  height: 100%;
  background: linear-gradient(90deg, #fdcb6e, #f59e0b);
  border-radius: 4px;
  transition: width 0.5s ease;
}

.category-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding-bottom: 20px;
}

.category-card {
  background: #ffffff;
  border-radius: 20px;
  padding: 20px 16px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  border: 2px solid #e8f0fe;
  text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.category-card:active {
  transform: scale(0.95);
}

.category-card:nth-child(1) { border-color: #fd79a8; }
.category-card:nth-child(2) { border-color: #0984e3; }
.category-card:nth-child(3) { border-color: #00b894; }
.category-card:nth-child(4) { border-color: #a29bfe; }
.category-card:nth-child(5) { border-color: #fdcb6e; }
.category-card:nth-child(6) { border-color: #fd79a8; }

.category-emoji {
  font-size: 40px;
  margin-bottom: 8px;
}

.category-name {
  color: #2d3436;
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 4px;
}

.category-progress {
  color: #636e72;
  font-size: 12px;
}

.level-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.level-card {
  background: #ffffff;
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: transform 0.2s;
  border: 2px solid #e8f0fe;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.level-card:active {
  transform: scale(0.97);
}

.level-card.locked {
  opacity: 0.5;
  cursor: not-allowed;
}

.level-card-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.level-badge {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: white;
  font-size: 16px;
}

.level-card:nth-child(1) .level-badge { background: #00b894; }
.level-card:nth-child(2) .level-badge { background: #0984e3; }
.level-card:nth-child(3) .level-badge { background: #fd79a8; }
.level-card:nth-child(4) .level-badge { background: #fdcb6e; }

.level-card-info {
  color: #2d3436;
}

.level-card-title {
  font-size: 16px;
  font-weight: bold;
}

.level-card-sub {
  font-size: 12px;
  color: #636e72;
}

.level-stars {
  font-size: 20px;
}

/* Question screen */
.question-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.progress-dots {
  display: flex;
  gap: 4px;
}

.progress-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #dbeafe;
}

.progress-dot.correct { background: #00b894; }
.progress-dot.wrong { background: #fd79a8; }
.progress-dot.current { background: #0984e3; }

.combo-display {
  color: #f59e0b;
  font-size: 14px;
  font-weight: bold;
}

.question-box {
  background: #ffffff;
  border: 2px solid #e8f0fe;
  border-radius: 20px;
  padding: 24px 20px;
  margin-bottom: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.question-text {
  color: #2d3436;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
  line-height: 1.6;
}

.passage-text {
  color: #2d3436;
  font-size: 15px;
  line-height: 1.8;
  margin-bottom: 16px;
  padding: 16px;
  background: #f8fafc;
  border-radius: 12px;
  border-left: 3px solid #60a5fa;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.option-btn {
  background: #e8f0fe;
  border: 2px solid #e8f0fe;
  border-radius: 12px;
  padding: 16px 12px;
  color: #2d3436;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  line-height: 1.4;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.option-btn:active {
  transform: scale(0.95);
}

.option-btn.correct {
  background: rgba(16,185,129,0.3);
  border-color: #10b981;
  animation: popIn 0.3s ease;
}

.option-btn.wrong {
  background: rgba(239,68,68,0.3);
  border-color: #ef4444;
  animation: shake 0.3s ease;
}

.option-btn.disabled {
  pointer-events: none;
  opacity: 0.6;
}

.option-btn.show-correct {
  border-color: #10b981;
  background: rgba(16,185,129,0.2);
}

.explanation-box {
  background: #f1f5f9;
  border-radius: 12px;
  padding: 16px;
  margin-top: 16px;
  display: none;
  animation: fadeIn 0.3s ease;
}

.explanation-box.show {
  display: block;
}

.explanation-text {
  color: #2d3436;
  font-size: 14px;
  line-height: 1.6;
}

.next-btn {
  display: none;
  width: 100%;
  padding: 16px;
  margin-top: 16px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s;
}

.next-btn.show {
  display: block;
}

.next-btn:active {
  transform: scale(0.97);
}

/* Result screen */
.result-container {
  text-align: center;
  padding-top: 40px;
}

.result-stars {
  font-size: 48px;
  margin-bottom: 16px;
  animation: popIn 0.5s ease;
}

.result-score {
  color: white;
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 8px;
}

.result-detail {
  color: #2d3436;
  font-size: 16px;
  margin-bottom: 24px;
}

.result-exp {
  background: #e8f0fe;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 24px;
  color: #fbbf24;
  font-size: 18px;
  font-weight: bold;
}

.result-buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.result-btn {
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s;
}

.result-btn:active {
  transform: scale(0.97);
}

.result-btn.primary {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
}

.result-btn.secondary {
  background: #dbeafe;
  color: white;
}
</style>
</head>

    </div>
    <button class="next-btn" id="next-btn">下一題 →</button>
  </div>

  <!-- Result Screen -->
  <div class="screen" id="result-screen">
    <div class="result-container">
      <div class="result-stars" id="result-stars"></div>
      <div class="result-score" id="result-score"></div>
      <div class="result-detail" id="result-detail"></div>
      <div class="result-exp" id="result-exp"></div>
      <div class="result-buttons">

</div>

  {name:"造句達人", exp:300},
  {name:"成語高手", exp:600},
  {name:"閱讀王者", exp:1000},
  {name:"國學大師", exp:2000}
];

const LEVEL_NAMES = ["L1 基礎","L2 進階","L3 挑戰","L4 大師"];

// ===== GAME STATE =====
let state = {
  exp: 0,
  maxCombo: 0,
  categoryStars: {},  // {idiom: {0:3, 1:2, ...}, ...}
  soundOn: true
};

let currentGame = {
  categoryId: null,
  level: 0,
  questions: [],
  questionIndex: 0,
  score: 0,
  combo: 0,
  answers: []
};

// ===== AUDIO =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  if (!state.soundOn) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'correct') {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } else if (type === 'star') {
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      osc.frequency.setValueAtTime(554, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.2);
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
    } else if (type === 'tap') {
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.1);
    }
  } catch(e) {}
}

// ===== SAVE/LOAD =====
function saveState() {
  localStorage.setItem('chinese_game_state', JSON.stringify(state));
}

function loadState() {
  const saved = localStorage.getItem('chinese_game_state');
  if (saved) {
    const parsed = JSON.parse(saved);
    state = {...state, ...parsed};
  }
}

// ===== RANK FUNCTIONS =====
function getCurrentRank() {
  let rank = RANKS[0];
  for (let i = RANKS.length - 1; i >= 0; i--) {
    if (state.exp >= RANKS[i].exp) {
      rank = RANKS[i];
      break;
    }
  }
  return rank;
}

function getNextRank() {
  for (let i = 0; i < RANKS.length; i++) {
    if (state.exp < RANKS[i].exp) return RANKS[i];
  }
  return null;
}

// ===== SCREEN MANAGEMENT =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== HOME SCREEN =====
function renderHome() {
  // Stats
  document.getElementById('stat-exp').textContent = state.exp;
  document.getElementById('stat-rank').textContent = getCurrentRank().name;
  document.getElementById('stat-combo').textContent = state.maxCombo;

  // EXP bar
  const current = getCurrentRank();
  const next = getNextRank();
  document.getElementById('rank-current').textContent = current.name;
  if (next) {
    document.getElementById('rank-next').textContent = `→ ${next.name} (${next.exp})`;
    const progress = ((state.exp - current.exp) / (next.exp - current.exp)) * 100;
    document.getElementById('exp-fill').style.width = Math.min(100, progress) + '%';
  } else {
    document.getElementById('rank-next').textContent = '已達最高!';
    document.getElementById('exp-fill').style.width = '100%';
  }

  // Category grid
  const grid = document.getElementById('category-grid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const stars = getCategoryTotalStars(cat.id);
    const maxStars = 4 * 3; // 4 levels * 3 max stars
    const card = document.createElement('div');
    card.className = 'category-card';
    card.innerHTML = `
      <div class="category-emoji">${cat.emoji}</div>
      <div class="category-name">${cat.name}</div>
      <div class="category-progress">⭐ ${stars}/${maxStars}</div>
    `;
    card.onclick = () => {
      playSound('tap');
      openCategory(cat.id);
    };
    grid.appendChild(card);
  });

  showScreen('home-screen');
}

function getCategoryTotalStars(catId) {
  if (!state.categoryStars[catId]) return 0;
  return Object.values(state.categoryStars[catId]).reduce((a, b) => a + b, 0);
}

// ===== LEVEL SELECT =====
function openCategory(catId) {
  currentGame.categoryId = catId;
  const cat = CATEGORIES.find(c => c.id === catId);
  document.getElementById('level-screen-title').textContent = cat.emoji + ' ' + cat.name;

  const list = document.getElementById('level-list');
  list.innerHTML = '';

  for (let i = 0; i < 4; i++) {
    const stars = (state.categoryStars[catId] && state.categoryStars[catId][i]) || 0;
    const locked = i > 0 && !((state.categoryStars[catId] && state.categoryStars[catId][i-1]) >= 1);

    const card = document.createElement('div');
    card.className = 'level-card' + (locked ? ' locked' : '');
    card.innerHTML = `
      <div class="level-card-left">
        <div class="level-badge">${LEVEL_NAMES[i].split(' ')[0]}</div>
        <div class="level-card-info">
          <div class="level-card-title">${LEVEL_NAMES[i]}</div>
          <div class="level-card-sub">25 題挑戰</div>
        </div>
      </div>
      <div class="level-stars">${stars > 0 ? '⭐'.repeat(stars) : (locked ? '🔒' : '—')}</div>
    `;

    if (!locked) {
      card.onclick = () => {
        playSound('tap');
        startGame(catId, i);
      };
    }
    list.appendChild(card);
  }

  showScreen('level-screen');
}

// ===== QUESTION GENERATION =====
function getQuestionsForLevel(catId, level) {
  if (catId === 'reading') {
    return getReadingQuestions(level);
  }

  const allQ = QUESTIONS[catId];
  const total = allQ.length;
  const perLevel = Math.floor(total / 4);

  // Divide questions into level ranges
  const start = level * perLevel;
  let end = (level + 1) * perLevel;
  if (level === 3) end = total; // Last level gets remaining

  const pool = allQ.slice(start, end);
  // Shuffle and pick 10
  const shuffled = pool.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 25);
}

function getReadingQuestions(level) {
  const passages = QUESTIONS.reading;
  const perLevel = Math.floor(passages.length / 4);
  const start = level * perLevel;
  let end = (level + 1) * perLevel;
  if (level === 3) end = passages.length;

  const pool = passages.slice(start, end);
  const shuffled = pool.sort(() => Math.random() - 0.5);

  // Flatten passage questions, take up to 10
  let questions = [];
  for (const p of shuffled) {
    for (const q of p.questions) {
      questions.push({
        ...q,
        passage: p.passage,
        question: q.q,
        explanation: ""
      });
      if (questions.length >= 25) break;
    }
    if (questions.length >= 25) break;
  }
  return questions.slice(0, 25);
}

// ===== GAME ENGINE =====
function startGame(catId, level) {
  currentGame = {
    categoryId: catId,
    level: level,
    questions: getQuestionsForLevel(catId, level),
    questionIndex: 0,
    score: 0,
    combo: 0,
    answers: []
  };

  showScreen('question-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = currentGame.questions[currentGame.questionIndex];

  // Progress dots
  const dotsEl = document.getElementById('progress-dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < currentGame.questions.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    if (i < currentGame.questionIndex) {
      dot.className += currentGame.answers[i] ? ' correct' : ' wrong';
    } else if (i === currentGame.questionIndex) {
      dot.className += ' current';
    }
    dotsEl.appendChild(dot);
  }

  // Combo
  const comboEl = document.getElementById('combo-display');
  comboEl.textContent = currentGame.combo > 1 ? `🔥 ${currentGame.combo} 連擊!` : '';

  // Passage (for reading)
  const passageContainer = document.getElementById('passage-container');
  if (q.passage) {
    passageContainer.innerHTML = `<div class="passage-text">${q.passage}</div>`;
  } else {
    passageContainer.innerHTML = '';
  }

  // Question text
  document.getElementById('question-text').textContent = q.question;

  // Options
  const optGrid = document.getElementById('options-grid');
  optGrid.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(idx);
    optGrid.appendChild(btn);
  });

  // Hide explanation and next button
  document.getElementById('explanation-box').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');
}

function selectAnswer(idx) {
  const q = currentGame.questions[currentGame.questionIndex];
  const correct = idx === q.answer;
  const buttons = document.querySelectorAll('.option-btn');

  // Disable all buttons
  buttons.forEach(btn => btn.classList.add('disabled'));

  // Show correct/wrong
  if (correct) {
    buttons[idx].classList.add('correct');
    currentGame.score++;
    currentGame.combo++;
    if (currentGame.combo > state.maxCombo) {
      state.maxCombo = currentGame.combo;
    }
    playSound('correct');
  } else {
    buttons[idx].classList.add('wrong');
    buttons[q.answer].classList.add('show-correct');
    currentGame.combo = 0;
    playSound('wrong');
  }

  currentGame.answers.push(correct);

  // Update combo display
  const comboEl = document.getElementById('combo-display');
  comboEl.textContent = currentGame.combo > 1 ? `🔥 ${currentGame.combo} 連擊!` : '';

  // Show explanation
  if (q.explanation) {
    document.getElementById('explanation-text').textContent = (correct ? '✅ 正確！' : '❌ 錯了！') + ' ' + q.explanation;
    document.getElementById('explanation-box').classList.add('show');
  } else {
    document.getElementById('explanation-text').textContent = correct ? '✅ 正確！' : '❌ 答錯了，正確答案是「' + q.options[q.answer] + '」';
    document.getElementById('explanation-box').classList.add('show');
  }

  // Show next button
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  currentGame.questionIndex++;
  if (currentGame.questionIndex >= currentGame.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ===== RESULT SCREEN =====
function showResult() {
  const score = currentGame.score;
  const total = currentGame.questions.length;
  let stars = 0;
  if (score >= 20) stars = 3;
  else if (score >= 8) stars = 2;
  else if (score >= 6) stars = 1;

  // Calculate EXP
  const baseExp = score * 5;
  const comboBonus = Math.min(currentGame.combo, 10) * 2;
  const starBonus = stars * 10;
  const totalExp = baseExp + comboBonus + starBonus;

  // Update state
  state.exp += totalExp;
  if (!state.categoryStars[currentGame.categoryId]) {
    state.categoryStars[currentGame.categoryId] = {};
  }
  const prevStars = state.categoryStars[currentGame.categoryId][currentGame.level] || 0;
  if (stars > prevStars) {
    state.categoryStars[currentGame.categoryId][currentGame.level] = stars;
  }
  saveState();

  // Render result
  document.getElementById('result-stars').textContent = stars > 0 ? '⭐'.repeat(stars) : '😢';
  document.getElementById('result-score').textContent = `${score} / ${total}`;
  document.getElementById('result-detail').textContent = stars >= 3 ? '太厲害了！滿分過關！' : stars >= 2 ? '很棒！繼續加油！' : stars >= 1 ? '及格了！再練習會更好！' : '再試一次吧！加油！';
  document.getElementById('result-exp').textContent = `+${totalExp} EXP (答對${baseExp} + 連擊${comboBonus} + 星星${starBonus})`;

  // Button visibility
  const nextBtn = document.getElementById('result-next');
  if (stars >= 1 && currentGame.level < 3) {
    nextBtn.style.display = 'block';
    nextBtn.textContent = '下一關 →';
  } else if (stars >= 1) {
    nextBtn.style.display = 'block';
    nextBtn.textContent = '回到關卡選擇';
  } else {
    nextBtn.style.display = 'none';
  }

  showScreen('result-screen');
  playSound('star');
}

// ===== EVENT LISTENERS =====
document.getElementById('sound-toggle').onclick = function() {
  state.soundOn = !state.soundOn;
  this.textContent = state.soundOn ? '🔊' : '🔇';
  saveState();
};

document.getElementById('back-to-home').onclick = function() {
  playSound('tap');
  renderHome();
};

document.getElementById('next-btn').onclick = function() {
  playSound('tap');
  nextQuestion();
};

document.getElementById('result-next').onclick = function() {
  playSound('tap');
  if (currentGame.level < 3) {
    startGame(currentGame.categoryId, currentGame.level + 1);
  } else {
    openCategory(currentGame.categoryId);
  }
};

document.getElementById('result-retry').onclick = function() {
  playSound('tap');
  startGame(currentGame.categoryId, currentGame.level);
};

document.getElementById('result-home').onclick = function() {
  playSound('tap');
  renderHome();
};

// ===== INIT =====
loadState();
renderHome();
</script>
