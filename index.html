<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>學習冒險基地 🚀</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  background: #1a1a2e;
  color: #fff;
  padding: 24px;
}
.container { max-width: 600px; margin: 0 auto; }
header { text-align: center; margin-bottom: 32px; }
header h1 { font-size: 28px; margin-bottom: 8px; }
header p { color: #a0a0c0; font-size: 14px; }
.section-label {
  font-size: 12px; font-weight: 700; color: #a0a0c0;
  text-transform: uppercase; letter-spacing: 2px;
  margin: 24px 0 12px; padding-left: 4px;
}
.grid { display: grid; gap: 12px; }
a.card {
  display: flex; align-items: center; gap: 16px;
  background: #16213e; border: 1px solid #2a3a5e;
  border-radius: 16px; padding: 20px;
  text-decoration: none; color: #fff;
  transition: all .2s;
}
a.card:hover { background: #1f2f50; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
a.card:active { transform: scale(0.98); }
.card .icon { font-size: 36px; flex-shrink: 0; }
.card .info h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.card .info p { font-size: 12px; color: #a0a0c0; line-height: 1.5; }
.card .arrow { margin-left: auto; font-size: 20px; color: #4a5a8a; }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>🚀 學習冒險基地</h1>
  <p>選一個開始玩吧！</p>
</header>

<div class="section-label">📐 數學</div>
<div class="grid">
  <a class="card" href="math.html">
    <span class="icon">🎮</span>
    <div class="info">
      <h2>數學冒險王</h2>
      <p>加減乘除四則運算練習</p>
    </div>
    <span class="arrow">→</span>
  </a>
  <a class="card" href="multiply.html">
    <span class="icon">✖️</span>
    <div class="info">
      <h2>九九乘法挑戰</h2>
      <p>乘法速算特訓</p>
    </div>
    <span class="arrow">→</span>
  </a>
  <a class="card" href="number_theory.html">
    <span class="icon">🔢</span>
    <div class="info">
      <h2>數論探險（基礎）</h2>
      <p>奇偶數 · 質數 · 因數倍數 · GCD/LCM · 因數分解樹</p>
    </div>
    <span class="arrow">→</span>
  </a>
  <a class="card" href="number_theory_advanced.html">
    <span class="icon">🧠</span>
    <div class="info">
      <h2>數論探險（進階）</h2>
      <p>輾轉相除 · 模運算 · 費馬 · CRT · RSA 加密</p>
    </div>
    <span class="arrow">→</span>
  </a>
</div>

<div class="section-label">📚 英文</div>
<div class="grid">
  <a class="card" href="practice.html">
    <span class="icon">📖</span>
    <div class="info">
      <h2>英文單字王</h2>
      <p>CEFR / COCA / GEPT 分級字彙練習</p>
    </div>
    <span class="arrow">→</span>
  </a>
  <a class="card" href="vocabulary_app.html">
    <span class="icon">🏆</span>
    <div class="info">
      <h2>競賽英文單字</h2>
      <p>進階單字特訓（中級/高級競賽）</p>
    </div>
    <span class="arrow">→</span>
  </a>
</div>

<div class="section-label">🀄 國語</div>
<div class="grid">
  <a class="card" href="chinese.html">
    <span class="icon">✍️</span>
    <div class="info">
      <h2>國語練習</h2>
      <p>中文閱讀與識字</p>
    </div>
    <span class="arrow">→</span>
  </a>
</div>

</div>
</body>
</html>
