<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Builder - Competition Prep</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #e8f4fd 0%, #f0f9ff 50%, #fef9e7 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2d3436;
            font-size: 2em;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #636e72;
            margin-bottom: 20px;
            font-size: 1em;
        }

        .progress-bar {
            background: #e8f0fe;
            border-radius: 20px;
            height: 12px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #fdcb6e, #f59e0b);
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: #ffffff;
            border: 2px solid #e8f0fe;
            padding: 6px 16px;
            border-radius: 20px;
            color: #2d3436;
            font-weight: bold;
            font-size: 0.9em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        /* Grade selector */
        .grade-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .grade-btn {
            padding: 8px 20px;
            border: 2px solid #e8f0fe;
            background: #ffffff;
            color: #2d3436;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .grade-btn:hover, .grade-btn.active {
            background: #0984e3;
            color: white;
            border-color: #0984e3;
        }

        .category-selector {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .cat-btn {
            padding: 5px 12px;
            border: 2px solid #e8f0fe;
            background: #ffffff;
            color: #636e72;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .cat-btn:hover, .cat-btn.active {
            background: #0984e3;
            color: white;
            border-color: #0984e3;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 9px 18px;
            border: 2px solid #e8f0fe;
            background: #ffffff;
            color: #2d3436;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .mode-btn:hover, .mode-btn.active {
            background: #0984e3;
            color: white;
            border-color: #0984e3;
            transform: scale(1.05);
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Visual Learning Mode */
        .visual-container {
            text-align: center;
            width: 100%;
        }

        .word-display {
            font-size: 3.2em;
            font-weight: 800;
            color: #2d3748;
            margin-bottom: 5px;
            letter-spacing: 2px;
            animation: popIn 0.4s ease;
        }

        .word-chinese {
            font-size: 1.5em;
            color: #0984e3;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .word-phonetic {
            font-size: 1.1em;
            color: #718096;
            margin-bottom: 15px;
            font-style: italic;
        }

        .word-scene {
            width: 100%;
            height: 180px;
            margin: 15px 0;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
        }

        .scene-canvas {
            width: 100%;
            height: 100%;
            border-radius: 16px;
        }

        .word-sentence {
            font-size: 1.05em;
            color: #636e72;
            margin: 12px 0;
            padding: 12px 18px;
            background: #f0f9ff;
            border-radius: 12px;
            border-left: 4px solid #0984e3;
            text-align: left;
        }

        .word-sentence strong {
            color: #0984e3;
        }

        .memory-tip {
            margin-top: 12px;
            padding: 10px 16px;
            background: linear-gradient(135deg, #fff3cd, #ffeaa7);
            border-radius: 12px;
            font-size: 0.9em;
            color: #856404;
            text-align: left;
        }

        .memory-tip::before {
            content: "💡 ";
            font-weight: bold;
        }

        .letter-breakdown {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .letter-box {
            width: 42px;
            height: 50px;
            background: linear-gradient(135deg, #0984e3, #a29bfe);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            animation: letterPop 0.3s ease forwards;
            opacity: 0;
            transform: scale(0);
        }

        /* Quiz Mode */
        .quiz-container {
            text-align: center;
            width: 100%;
        }

        .quiz-question {
            font-size: 1.3em;
            color: #2d3748;
            margin-bottom: 20px;
        }

        .quiz-word {
            font-size: 2.5em;
            font-weight: 800;
            color: #0984e3;
            margin-bottom: 20px;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        .quiz-option {
            padding: 16px 12px;
            border: 3px solid #e2e8f0;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.05em;
            transition: all 0.3s;
            background: white;
            color: #2d3748;
        }

        .quiz-option:hover {
            border-color: #0984e3;
            background: #f0f9ff;
            transform: translateY(-2px);
        }

        .quiz-option.correct {
            border-color: #00b894;
            background: #d4f8d4;
            color: #00b894;
            animation: correctPulse 0.5s ease;
        }

        .quiz-option.wrong {
            border-color: #fd79a8;
            background: #ffe8f0;
            color: #fd79a8;
            animation: shake 0.5s ease;
        }

        /* Spelling Mode */
        .spelling-container {
            text-align: center;
            width: 100%;
        }

        .spelling-hint {
            font-size: 1.4em;
            color: #2d3748;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .spelling-chinese {
            font-size: 1.2em;
            color: #0984e3;
            margin-bottom: 15px;
        }

        .spelling-input-area {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .spell-letter-input {
            width: 44px;
            height: 54px;
            border: 3px solid #e2e8f0;
            border-radius: 10px;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #2d3748;
            outline: none;
            transition: all 0.3s;
            text-transform: lowercase;
        }

        .spell-letter-input:focus {
            border-color: #0984e3;
            box-shadow: 0 0 0 3px rgba(9,132,227,0.15);
        }

        .spell-letter-input.correct {
            border-color: #00b894;
            background: #d4f8d4;
        }

        .spell-letter-input.wrong {
            border-color: #fd79a8;
            background: #ffe8f0;
        }

        .spell-letter-input.hint {
            border-color: #fdcb6e;
            background: #fef9e7;
            color: #f59e0b;
        }

        /* Matching Mode */
        .matching-container {
            width: 100%;
        }

        .matching-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }

        .matching-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .matching-column h3 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 5px;
        }

        .match-item {
            padding: 12px;
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-size: 1.05em;
            transition: all 0.3s;
            user-select: none;
        }

        .match-item.word-item {
            font-weight: bold;
            color: #2d3748;
        }

        .match-item.selected {
            border-color: #0984e3;
            background: #e8f0fe;
            transform: scale(1.03);
        }

        .match-item.matched {
            border-color: #00b894;
            background: #d4f8d4;
            opacity: 0.7;
            pointer-events: none;
        }

        .match-item.wrong-match {
            animation: shake 0.4s ease;
            border-color: #fd79a8;
        }

        /* Navigation */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 25px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-btn.primary {
            background: #0984e3;
            color: white;
        }

        .nav-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(9,132,227,0.3);
        }

        .nav-btn.secondary {
            background: #e8f0fe;
            color: #0984e3;
        }

        .nav-btn.secondary:hover {
            background: #dfe6fd;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .sound-btn {
            background: none;
            border: none;
            font-size: 1.6em;
            cursor: pointer;
            transition: transform 0.2s;
            vertical-align: middle;
        }

        .sound-btn:hover {
            transform: scale(1.2);
        }

        .word-counter {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #a0aec0;
            font-size: 0.85em;
        }

        /* Celebration */
        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: confettiFall 2.5s ease-out forwards;
        }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes letterPop {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .word-display { font-size: 2.4em; }
            .card { padding: 20px; min-height: 380px; }
            .quiz-options { grid-template-columns: 1fr; }
            .matching-grid { grid-template-columns: 1fr; }
            .letter-box { width: 34px; height: 42px; font-size: 1.2em; }
            .spell-letter-input { width: 36px; height: 44px; font-size: 1.2em; }
            h1 { font-size: 1.6em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="display:inline-block;padding:8px 16px;margin-bottom:16px;background:#e8f0fe;border-radius:10px;color:#0984e3;text-decoration:none;font-size:14px;font-weight:600;">← 回首頁</a>
        <h1>Vocabulary Competition Trainer</h1>
        <p class="subtitle">中年級 &amp; 高年級 | Visual Memory Method</p>

        <div class="stats">
            <span class="stat-item" id="stat-learned">Learned: 0</span>
            <span class="stat-item" id="stat-streak">Streak: 0</span>
            <span class="stat-item" id="stat-score">Score: 0</span>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="grade-selector">
            <button class="grade-btn active" onclick="switchGrade('middle')">中年級 (Grade 3-4)</button>
            <button class="grade-btn" onclick="switchGrade('upper')">高年級 (Grade 5-6)</button>
        </div>

        <div class="category-selector" id="category-selector"></div>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="visual" onclick="switchMode('visual')">Learn</button>
            <button class="mode-btn" data-mode="quiz" onclick="switchMode('quiz')">Quiz</button>
            <button class="mode-btn" data-mode="spelling" onclick="switchMode('spelling')">Spell It</button>
            <button class="mode-btn" data-mode="matching" onclick="switchMode('matching')">Match</button>
        </div>

        <div class="card" id="card-area"></div>
    </div>

    <div class="celebration" id="celebration"></div>

    <script>
    // ===== WORD DATABASE =====
    const wordDatabase = {
        middle: {
            "People & Family": [
                { word: "boy", chinese: "男孩", sentence: "The <strong>boy</strong> plays in the park.", tip: "B-O-Y: 只有3個字母的男孩，簡短有力！" },
                { word: "girl", chinese: "女孩", sentence: "The <strong>girl</strong> reads a book.", tip: "G-I-R-L: Girl 的 'irl' 聽起來像 'earl'（伯爵），女孩像公主！" },
                { word: "dad", chinese: "爸爸", sentence: "My <strong>dad</strong> cooks dinner.", tip: "DAD 正著反著拼都一樣！回文字！" },
                { word: "mom", chinese: "媽媽", sentence: "My <strong>mom</strong> gives me a hug.", tip: "MOM 也是正著反著都一樣的字！跟 DAD 一對！" },
                { word: "kid", chinese: "小孩", sentence: "Every <strong>kid</strong> loves ice cream.", tip: "KID 只有3個字母，像小孩一樣小小的！" },
                { word: "student", chinese: "學生", sentence: "The <strong>student</strong> studies hard.", tip: "STUD-ENT: 'study' 的人就是 student！" },
                { word: "teacher", chinese: "老師", sentence: "The <strong>teacher</strong> writes on the board.", tip: "TEACH-ER: 會 teach（教）的人就是 teacher！" },
                { word: "doctor", chinese: "醫生", sentence: "The <strong>doctor</strong> helps sick people.", tip: "DOC-TOR: 'Doc' 是醫生的暱稱！" },
                { word: "friend", chinese: "朋友", sentence: "She is my best <strong>friend</strong>.", tip: "FRI-END: 真正的朋友到 END（最後）都在！注意 'i' 在 'e' 前面。" },
                { word: "father", chinese: "父親", sentence: "My <strong>father</strong> is very tall.", tip: "FA-THER: Father 比 dad 更正式，像穿西裝的爸爸！" },
                { word: "mother", chinese: "母親", sentence: "My <strong>mother</strong> sings beautifully.", tip: "MO-THER: Mother 比 mom 更正式，像穿禮服的媽媽！" },
                { word: "brother", chinese: "兄弟", sentence: "My <strong>brother</strong> is older than me.", tip: "BRO-THER: 'Bro' 就是兄弟的簡稱！" },
                { word: "sister", chinese: "姊妹", sentence: "My <strong>sister</strong> likes to dance.", tip: "SIS-TER: 'Sis' 就是姊妹的簡稱！" },
                { word: "grandpa", chinese: "爺爺/外公", sentence: "My <strong>grandpa</strong> tells great stories.", tip: "GRAND-PA: grand（偉大的）+ pa（爸爸）= 偉大的爸爸！" },
                { word: "grandma", chinese: "奶奶/外婆", sentence: "My <strong>grandma</strong> bakes cookies.", tip: "GRAND-MA: grand（偉大的）+ ma（媽媽）= 偉大的媽媽！" }
            ],
            "Food & Drinks": [
                { word: "apple", chinese: "蘋果", sentence: "I eat an <strong>apple</strong> every day.", tip: "APPLE 有兩個 P，像蘋果切成兩半！" },
                { word: "cake", chinese: "蛋糕", sentence: "We have <strong>cake</strong> for dessert.", tip: "C-A-K-E: 結尾的 E 不發音，讓 A 說自己的名字！" },
                { word: "egg", chinese: "蛋", sentence: "I like fried <strong>egg</strong> for breakfast.", tip: "EGG 兩個 G，像蛋的兩端！又圓又短的字。" },
                { word: "banana", chinese: "香蕉", sentence: "The monkey eats a <strong>banana</strong>.", tip: "BA-NA-NA: 'na' 重複兩次！b-a-n-a-n-a 像香蕉一樣長長的字。" },
                { word: "milk", chinese: "牛奶", sentence: "I drink <strong>milk</strong> every morning.", tip: "M-I-L-K: 把 milk 想成白色的液體，M 像牛的角！" },
                { word: "rice", chinese: "米飯", sentence: "We eat <strong>rice</strong> for lunch.", tip: "RICE: 跟 'nice' 押韻！好吃的 rice 真 nice！" },
                { word: "tea", chinese: "茶", sentence: "Would you like some <strong>tea</strong>?", tip: "TEA: 發音像中文的「踢」！只有3個字母的飲料。" },
                { word: "water", chinese: "水", sentence: "Please drink more <strong>water</strong>.", tip: "WA-TER: W 像水的波浪！water 到處都需要。" },
                { word: "cook", chinese: "煮/廚師", sentence: "Mom can <strong>cook</strong> delicious food.", tip: "COOK: 兩個 O 像兩個鍋子！c-oo-k。" },
                { word: "orange", chinese: "柳橙/橘色", sentence: "The <strong>orange</strong> is sweet and juicy.", tip: "O-RANGE: 'O' 像橘子的形狀，orange 又是水果又是顏色！" },
                { word: "juice", chinese: "果汁", sentence: "I want a glass of <strong>juice</strong>.", tip: "JU-ICE: juice 裡面有 'ice'（冰）！冰冰涼涼的果汁。" },
                { word: "hamburger", chinese: "漢堡", sentence: "I ordered a big <strong>hamburger</strong>.", tip: "HAM-BUR-GER: 裡面有 ham（火腿）！漢堡最早來自德國 Hamburg 城市。" },
                { word: "ice cream", chinese: "冰淇淋", sentence: "Let's get some <strong>ice cream</strong>!", tip: "ICE + CREAM: 冰（ice）做的奶油（cream）！兩個字組成。" },
                { word: "pizza", chinese: "披薩", sentence: "We order <strong>pizza</strong> on Fridays.", tip: "PIZ-ZA: 兩個 Z 像披薩被切成的鋸齒狀！" }
            ],
            "Colors": [
                { word: "blue", chinese: "藍色", sentence: "The sky is <strong>blue</strong>.", tip: "BLUE: B-L-U-E，想像天空和大海都是 blue！" },
                { word: "green", chinese: "綠色", sentence: "The grass is <strong>green</strong>.", tip: "GREEN: 有兩個 E 像兩片綠葉！gr-ee-n。" },
                { word: "red", chinese: "紅色", sentence: "She wears a <strong>red</strong> dress.", tip: "RED: 只有3個字母，像紅色一樣簡單有力！" },
                { word: "yellow", chinese: "黃色", sentence: "The sunflower is <strong>yellow</strong>.", tip: "YELL-OW: yell（大叫）+ ow（痛）！黃色像大叫一樣醒目！" },
                { word: "color", chinese: "顏色", sentence: "What <strong>color</strong> do you like?", tip: "COL-OR: 美式拼法沒有 'u'（英式是 colour）。" },
                { word: "black", chinese: "黑色", sentence: "The cat is <strong>black</strong>.", tip: "BLACK: 'bl' 開頭像 'block'（擋住光線就是黑色）！" },
                { word: "white", chinese: "白色", sentence: "Snow is <strong>white</strong>.", tip: "WHITE: 'wh' 開頭像在吹氣，白色像雲一樣輕！" }
            ],
            "Animals": [
                { word: "bird", chinese: "鳥", sentence: "The <strong>bird</strong> sings in the tree.", tip: "BIRD: 把 'b' 想成鳥的身體，'d' 像翅膀！" },
                { word: "cat", chinese: "貓", sentence: "The <strong>cat</strong> sleeps on the sofa.", tip: "CAT: C-A-T 只有3個字母，像貓一樣小巧！" },
                { word: "cow", chinese: "乳牛", sentence: "The <strong>cow</strong> gives us milk.", tip: "COW: 發音像牛叫的聲音的開頭！" },

    // ===== STATE =====
    let currentGrade = 'middle';
    let currentCategory = '';
    let currentMode = 'visual';
    let currentWordIndex = 0;
    let allWords = [];
    let score = 0;
    let streak = 0;
    let learnedWords = new Set();

    // ===== INIT =====
    function init() {
        const categories = Object.keys(wordDatabase[currentGrade]);
        currentCategory = categories[0];
        loadCategory(currentCategory);
    }

    function switchGrade(grade) {
        currentGrade = grade;
        document.querySelectorAll('.grade-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent.includes(grade === 'middle' ? '中年級' : '高年級'));
        });
        const categories = Object.keys(wordDatabase[currentGrade]);
        currentCategory = categories[0];
        currentWordIndex = 0;
        loadCategory(currentCategory);
    }

    function loadCategory(category) {
        currentCategory = category;
        currentWordIndex = 0;
        allWords = [...wordDatabase[currentGrade][category]];
        buildCategorySelector();
        render();
    }

    function buildCategorySelector() {
        const container = document.getElementById('category-selector');
        const categories = Object.keys(wordDatabase[currentGrade]);
        container.innerHTML = categories.map(cat =>
            `<button class="cat-btn ${cat === currentCategory ? 'active' : ''}" onclick="loadCategory('${cat}')">${cat}</button>`
        ).join('');
    }

    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });
        render();
    }

    function render() {
        updateProgress();
        switch (currentMode) {
            case 'visual': renderVisual(); break;
            case 'quiz': renderQuiz(); break;
            case 'spelling': renderSpelling(); break;
            case 'matching': renderMatching(); break;
        }
    }

    function updateProgress() {
        const total = Object.values(wordDatabase[currentGrade]).flat().length;
        const pct = (learnedWords.size / total) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('stat-learned').textContent = `Learned: ${learnedWords.size}/${total}`;
        document.getElementById('stat-streak').textContent = `Streak: ${streak}`;
        document.getElementById('stat-score').textContent = `Score: ${score}`;
    }

    // ===== VISUAL MODE =====
    function renderVisual() {
        const word = allWords[currentWordIndex];
        const card = document.getElementById('card-area');
        card.innerHTML = `
            <span class="word-counter">${currentWordIndex + 1} / ${allWords.length}</span>
            <div class="visual-container">
                <div class="word-display">${word.word} <button class="sound-btn" onclick="speakWord('${word.word.replace(/'/g, "\\'")}')">&#128264;</button></div>
                <div class="word-chinese">${word.chinese}</div>
                <div class="letter-breakdown" id="letter-breakdown"></div>
                <div class="word-scene">
                    <canvas class="scene-canvas" id="scene-canvas"></canvas>
                </div>
                <div class="word-sentence">${word.sentence}</div>
                <div class="memory-tip">${word.tip}</div>
                <div class="nav-buttons">
                    <button class="nav-btn secondary" onclick="prevWord()" ${currentWordIndex === 0 ? 'disabled' : ''}>&#8592; Prev</button>
                    <button class="nav-btn primary" onclick="markLearned()">&#10003; Got it!</button>
                    <button class="nav-btn secondary" onclick="nextWord()" ${currentWordIndex === allWords.length - 1 ? 'disabled' : ''}>Next &#8594;</button>
                </div>
            </div>
        `;
        animateLetters(word.word);
        setTimeout(() => drawWordScene(word), 100);
    }

    function animateLetters(word) {
        const container = document.getElementById('letter-breakdown');
        if (!container) return;
        const letters = word.replace(/\s+/g, ' ').split('');
        container.innerHTML = letters.map((letter, i) => {
            if (letter === ' ') return `<div style="width:15px"></div>`;
            return `<div class="letter-box" style="animation-delay: ${i * 0.07}s">${letter.toUpperCase()}</div>`;
        }).join('');
    }

    // ===== SCENE DRAWING =====
    function drawWordScene(word) {
        const canvas = document.getElementById('scene-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        // Determine category-based scene
        const cat = currentCategory;
        const wrd = word.word.toLowerCase();

        if (cat.includes('Animal')) drawAnimalScene(ctx, w, h, wrd);
        else if (cat.includes('Food') || cat.includes('Meal')) drawFoodScene(ctx, w, h, wrd);
        else if (cat.includes('Color')) drawColorScene(ctx, w, h, wrd);
        else if (cat.includes('Body')) drawBodyScene(ctx, w, h, wrd);
        else if (cat.includes('Weather') || cat.includes('Nature') || cat.includes('Season')) drawNatureScene(ctx, w, h, wrd);
        else if (cat.includes('Place')) drawPlaceScene(ctx, w, h, wrd);
        else if (cat.includes('Number')) drawNumberScene(ctx, w, h, wrd);
        else if (cat.includes('Day') || cat.includes('Time')) drawTimeScene(ctx, w, h, wrd);
        else if (cat.includes('Action')) drawActionScene(ctx, w, h, wrd);
        else if (cat.includes('Feeling') || cat.includes('Adjective')) drawFeelingScene(ctx, w, h, wrd);
        else if (cat.includes('Cloth')) drawClothingScene(ctx, w, h, wrd);
        else if (cat.includes('School') && cat.includes('Subject')) drawSubjectScene(ctx, w, h, wrd);
        else if (cat.includes('School') || cat.includes('Thing')) drawSchoolScene(ctx, w, h, wrd);
        else if (cat.includes('Home') || cat.includes('Furniture')) drawHomeScene(ctx, w, h, wrd);
        else if (cat.includes('Transport')) drawTransportScene(ctx, w, h, wrd);
        else if (cat.includes('People') || cat.includes('Family')) drawPeopleScene(ctx, w, h, wrd);
        else if (cat.includes('Countr') || cat.includes('Object')) drawObjectScene(ctx, w, h, wrd);
        else drawGenericScene(ctx, w, h, wrd);
    }

    function drawAnimalScene(ctx, w, h, word) {
        // Background
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#87CEEB');
        grad.addColorStop(1, '#90EE90');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#7CCD7C';
        ctx.fillRect(0, h - 30, w, 30);

        // Draw specific animal
        const cx = w / 2, cy = h / 2;
        ctx.textAlign = 'center';

        if (word === 'cat') {
            ctx.fillStyle = '#FF8C00';
            ctx.beginPath(); ctx.ellipse(cx, cy + 10, 30, 25, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx, cy - 20, 18, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(cx - 12, cy - 35); ctx.lineTo(cx - 18, cy - 52); ctx.lineTo(cx - 3, cy - 38); ctx.fill();
            ctx.beginPath(); ctx.moveTo(cx + 12, cy - 35); ctx.lineTo(cx + 18, cy - 52); ctx.lineTo(cx + 3, cy - 38); ctx.fill();
            ctx.fillStyle = '#2d3748';
            ctx.beginPath(); ctx.arc(cx - 7, cy - 22, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 7, cy - 22, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#FF69B4';
            ctx.beginPath(); ctx.moveTo(cx, cy - 16); ctx.lineTo(cx - 3, cy - 13); ctx.lineTo(cx + 3, cy - 13); ctx.fill();
            // Whiskers
            ctx.strokeStyle = '#2d3748'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(cx - 8, cy - 15); ctx.lineTo(cx - 28, cy - 18); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx - 8, cy - 13); ctx.lineTo(cx - 28, cy - 11); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + 8, cy - 15); ctx.lineTo(cx + 28, cy - 18); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + 8, cy - 13); ctx.lineTo(cx + 28, cy - 11); ctx.stroke();
            // Tail
            ctx.strokeStyle = '#FF8C00'; ctx.lineWidth = 6; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(cx + 25, cy + 20); ctx.quadraticCurveTo(cx + 55, cy, cx + 45, cy - 20); ctx.stroke();
        } else if (word === 'dog') {
            ctx.fillStyle = '#D2691E';
            ctx.beginPath(); ctx.ellipse(cx, cy + 10, 35, 28, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 25, cy - 15, 20, 0, Math.PI * 2); ctx.fill();
            // Ears
            ctx.fillStyle = '#8B4513';
            ctx.beginPath(); ctx.ellipse(cx + 10, cy - 25, 8, 15, 0.3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(cx + 40, cy - 25, 8, 15, -0.3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#2d3748';
            ctx.beginPath(); ctx.arc(cx + 22, cy - 18, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 32, cy - 18, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath(); ctx.arc(cx + 27, cy - 10, 5, 0, Math.PI * 2); ctx.fill();
            // Tail wagging
            ctx.strokeStyle = '#D2691E'; ctx.lineWidth = 6; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(cx - 30, cy + 5); ctx.quadraticCurveTo(cx - 55, cy - 20, cx - 45, cy - 35); ctx.stroke();
            // Legs
            ctx.fillStyle = '#D2691E';
            ctx.fillRect(cx - 15, cy + 30, 10, 20);
            ctx.fillRect(cx + 5, cy + 30, 10, 20);
        } else if (word === 'bird') {
            ctx.fillStyle = '#FF6347';
            ctx.beginPath(); ctx.ellipse(cx, cy, 20, 15, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 18, cy - 10, 10, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#FFD700';
            ctx.beginPath(); ctx.moveTo(cx + 26, cy - 10); ctx.lineTo(cx + 35, cy - 8); ctx.lineTo(cx + 26, cy - 6); ctx.fill();
            ctx.fillStyle = '#2d3748';
            ctx.beginPath(); ctx.arc(cx + 21, cy - 12, 2, 0, Math.PI * 2); ctx.fill();
            // Wing
            ctx.fillStyle = '#CD5C5C';
            ctx.beginPath(); ctx.ellipse(cx - 5, cy - 5, 15, 8, -0.3, 0, Math.PI * 2); ctx.fill();
            // Tail
            ctx.fillStyle = '#B22222';
            ctx.beginPath(); ctx.moveTo(cx - 18, cy); ctx.lineTo(cx - 35, cy - 8); ctx.lineTo(cx - 33, cy + 5); ctx.fill();
        } else if (word === 'fish') {
            ctx.fillStyle = '#4FC3F7'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#FF8C00';
            ctx.beginPath(); ctx.ellipse(cx, cy, 35, 20, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#FF6347';
            ctx.beginPath(); ctx.moveTo(cx - 30, cy); ctx.lineTo(cx - 50, cy - 15); ctx.lineTo(cx - 50, cy + 15); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(cx + 15, cy - 5, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath(); ctx.arc(cx + 16, cy - 5, 3, 0, Math.PI * 2); ctx.fill();
            // Bubbles
            ctx.strokeStyle = '#636e72'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(cx + 40, cy - 15, 4, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx + 45, cy - 28, 3, 0, Math.PI * 2); ctx.stroke();
        } else if (word === 'elephant') {
            ctx.fillStyle = '#808080';
            ctx.beginPath(); ctx.ellipse(cx, cy + 5, 55, 40, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 40, cy - 20, 25, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#696969';
            ctx.beginPath(); ctx.ellipse(cx + 60, cy - 20, 15, 22, 0.2, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#808080'; ctx.lineWidth = 12; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(cx + 60, cy - 5); ctx.quadraticCurveTo(cx + 75, cy + 20, cx + 65, cy + 35); ctx.stroke();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(cx + 48, cy - 25, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath(); ctx.arc(cx + 49, cy - 25, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#707070';
            ctx.fillRect(cx - 25, cy + 35, 14, 25);
            ctx.fillRect(cx, cy + 35, 14, 25);
            ctx.fillRect(cx + 20, cy + 32, 14, 25);
        } else {
            drawGenericScene(ctx, w, h, word);
        }
        ctx.textAlign = 'start';
    }

    function drawFoodScene(ctx, w, h, word) {
        ctx.fillStyle = '#FFF8DC';
        ctx.fillRect(0, 0, w, h);
        // Table
        ctx.fillStyle = '#DEB887';
        ctx.fillRect(0, h * 0.65, w, h * 0.35);
        ctx.fillStyle = '#D2B48C';
        ctx.fillRect(0, h * 0.65, w, 5);

        const cx = w / 2, cy = h * 0.45;

        if (word === 'apple') {
            ctx.fillStyle = '#FF0000';
            ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#228B22';
            ctx.beginPath(); ctx.ellipse(cx + 5, cy - 30, 8, 5, 0.5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(cx - 2, cy - 32, 4, 10);
        } else if (word === 'banana') {
            ctx.fillStyle = '#FFD700';
            ctx.lineWidth = 3; ctx.strokeStyle = '#DAA520';
            ctx.beginPath();
            ctx.moveTo(cx - 40, cy + 10);
            ctx.quadraticCurveTo(cx, cy - 30, cx + 40, cy + 10);
            ctx.quadraticCurveTo(cx, cy + 5, cx - 40, cy + 10);
            ctx.fill(); ctx.stroke();
        } else if (word === 'cake') {
            ctx.fillStyle = '#FFDAB9';
            ctx.fillRect(cx - 40, cy - 10, 80, 45);
            ctx.fillStyle = '#FF69B4';
            ctx.fillRect(cx - 40, cy - 15, 80, 10);
            ctx.fillStyle = '#FF4500';
            ctx.fillRect(cx - 2, cy - 30, 4, 18);
            ctx.fillStyle = '#FFD700';
            ctx.beginPath(); ctx.ellipse(cx, cy - 33, 4, 6, 0, 0, Math.PI * 2); ctx.fill();
        } else if (word === 'pizza') {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath(); ctx.moveTo(cx, cy - 30); ctx.arc(cx, cy + 10, 45, -Math.PI * 0.8, -Math.PI * 0.2); ctx.fill();
            ctx.fillStyle = '#FF6347';
            for (let i = 0; i < 5; i++) {
                ctx.beginPath(); ctx.arc(cx - 15 + i * 10, cy - 5 + (i % 2) * 10, 5, 0, Math.PI * 2); ctx.fill();
            }
        } else if (word.includes('ice cream')) {
            ctx.fillStyle = '#DEB887';
            ctx.beginPath(); ctx.moveTo(cx - 15, cy); ctx.lineTo(cx, cy + 45); ctx.lineTo(cx + 15, cy); ctx.fill();
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath(); ctx.arc(cx - 8, cy - 8, 15, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#87CEEB';
            ctx.beginPath(); ctx.arc(cx + 8, cy - 8, 15, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#FFFACD';
            ctx.beginPath(); ctx.arc(cx, cy - 22, 13, 0, Math.PI * 2); ctx.fill();
        } else {
            drawGenericScene(ctx, w, h, word);
        }
    }

    function drawColorScene(ctx, w, h, word) {
        const colorMap = {
            'red': '#FF0000', 'blue': '#0000FF', 'green': '#008000',
            'yellow': '#FFD700', 'black': '#000000', 'white': '#FFFFFF',
            'pink': '#FF69B4', 'brown': '#8B4513', 'gray': '#808080',
            'grey': '#808080', 'purple': '#800080', 'orange': '#FF8C00',
            'color': null
        };

        // Rainbow background
        const colors = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#8F00FF'];
        if (word === 'color') {
            colors.forEach((c, i) => {
                ctx.fillStyle = c;
                ctx.fillRect(i * (w / 7), 0, w / 7 + 1, h);
            });
            ctx.fillStyle = '#636e72';
            ctx.font = 'bold 36px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('COLOR', w / 2, h / 2 + 12);
            ctx.textAlign = 'start';
        } else {
            const c = colorMap[word] || '#667eea';
            ctx.fillStyle = word === 'black' ? '#333' : '#f0f0f0';
            ctx.fillRect(0, 0, w, h);
            // Paint splash
            ctx.fillStyle = c;
            ctx.beginPath(); ctx.arc(w / 2, h / 2, 50, 0, Math.PI * 2); ctx.fill();
            // Splatter
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const r = 55 + Math.random() * 25;
                ctx.beginPath(); ctx.arc(w / 2 + Math.cos(angle) * r, h / 2 + Math.sin(angle) * r, 8 + Math.random() * 8, 0, Math.PI * 2); ctx.fill();
            }
            // Paintbrush
            ctx.fillStyle = '#8B4513';
            ctx.save(); ctx.translate(w / 2 + 60, h / 2 - 50); ctx.rotate(0.5);
            ctx.fillRect(0, 0, 8, 60);
            ctx.fillStyle = '#C0C0C0';
            ctx.fillRect(-2, 55, 12, 15);
            ctx.fillStyle = c;
            ctx.fillRect(-2, 68, 12, 10);
            ctx.restore();
        }
    }

    function drawBodyScene(ctx, w, h, word) {
        ctx.fillStyle = '#E8F4FD';
        ctx.fillRect(0, 0, w, h);
        const cx = w / 2, cy = h / 2;

        // Person outline
        ctx.fillStyle = '#FFCC80';
        ctx.beginPath(); ctx.arc(cx, cy - 35, 28, 0, Math.PI * 2); ctx.fill();

        // Highlight the body part
        ctx.fillStyle = '#FF6B6B';
        ctx.globalAlpha = 0.4;
        const partMap = {
            'head': () => { ctx.beginPath(); ctx.arc(cx, cy - 35, 30, 0, Math.PI * 2); ctx.fill(); },
            'eye': () => { ctx.beginPath(); ctx.arc(cx - 10, cy - 38, 8, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 10, cy - 38, 8, 0, Math.PI * 2); ctx.fill(); },
            'nose': () => { ctx.beginPath(); ctx.arc(cx, cy - 30, 7, 0, Math.PI * 2); ctx.fill(); },
            'mouth': () => { ctx.beginPath(); ctx.ellipse(cx, cy - 20, 12, 6, 0, 0, Math.PI * 2); ctx.fill(); },
            'face': () => { ctx.beginPath(); ctx.arc(cx, cy - 35, 30, 0, Math.PI * 2); ctx.fill(); },
            'hand': () => { ctx.beginPath(); ctx.arc(cx - 55, cy + 20, 12, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + 55, cy + 20, 12, 0, Math.PI * 2); ctx.fill(); },
            'arm': () => { ctx.fillRect(cx - 60, cy - 5, 25, 10); ctx.fillRect(cx + 35, cy - 5, 25, 10); },
            'leg': () => { ctx.fillRect(cx - 15, cy + 35, 12, 40); ctx.fillRect(cx + 5, cy + 35, 12, 40); },
            'foot': () => { ctx.beginPath(); ctx.ellipse(cx - 10, cy + 75, 14, 7, 0, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.ellipse(cx + 10, cy + 75, 14, 7, 0, 0, Math.PI * 2); ctx.fill(); }
        };
        if (partMap[word]) partMap[word]();
        ctx.globalAlpha = 1;

        // Draw stick figure
        ctx.strokeStyle = '#4a5568'; ctx.lineWidth = 3;
        // Body
        ctx.beginPath(); ctx.moveTo(cx, cy - 7); ctx.lineTo(cx, cy + 35); ctx.stroke();
        // Arms
        ctx.beginPath(); ctx.moveTo(cx - 35, cy + 5); ctx.lineTo(cx, cy); ctx.lineTo(cx + 35, cy + 5); ctx.stroke();
        // Legs
        ctx.beginPath(); ctx.moveTo(cx - 20, cy + 65); ctx.lineTo(cx, cy + 35); ctx.lineTo(cx + 20, cy + 65); ctx.stroke();
        // Eyes on face
        ctx.fillStyle = '#2d3748';
        ctx.beginPath(); ctx.arc(cx - 8, cy - 38, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + 8, cy - 38, 3, 0, Math.PI * 2); ctx.fill();
        // Smile
        ctx.strokeStyle = '#2d3748'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy - 28, 8, 0.2, Math.PI - 0.2); ctx.stroke();

        // Arrow pointing to part
        ctx.fillStyle = '#FF6B6B';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('👆 ' + word.toUpperCase(), cx, h - 15);
        ctx.textAlign = 'start';
    }

    function drawNatureScene(ctx, w, h, word) {
        if (word === 'sunny' || word === 'sun') {
            ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#90EE90'; ctx.fillRect(0, h - 30, w, 30);
            ctx.fillStyle = '#FFD700';
            ctx.beginPath(); ctx.arc(w / 2, h / 3, 40, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4;
            for (let i = 0; i < 12; i++) {
                const a = (i / 12) * Math.PI * 2;
                ctx.beginPath(); ctx.moveTo(w/2 + Math.cos(a)*48, h/3 + Math.sin(a)*48);
                ctx.lineTo(w/2 + Math.cos(a)*62, h/3 + Math.sin(a)*62); ctx.stroke();
            }
        } else if (word === 'rainy' || word === 'rain') {
            ctx.fillStyle = '#78909C'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#546E7A';
            drawCloud(ctx, w/3, h/4, 30); drawCloud(ctx, w*2/3, h/4, 35);
            ctx.fillStyle = '#42A5F5';
            for (let i = 0; i < 20; i++) {
                ctx.beginPath(); ctx.ellipse(Math.random()*w, h/3 + Math.random()*h*0.5, 2, 6, 0, 0, Math.PI*2); ctx.fill();
            }
        } else if (word === 'cloudy' || word === 'cloud') {
            ctx.fillStyle = '#B0BEC5'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#ECEFF1';
            drawCloud(ctx, w*0.25, h*0.3, 35); drawCloud(ctx, w*0.55, h*0.25, 45); drawCloud(ctx, w*0.8, h*0.35, 30);
            ctx.fillStyle = '#CFD8DC';
            drawCloud(ctx, w*0.4, h*0.55, 40); drawCloud(ctx, w*0.7, h*0.6, 35);
        } else if (word === 'windy') {
            ctx.fillStyle = '#B3E5FC'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#90EE90'; ctx.fillRect(0, h-30, w, 30);
            ctx.strokeStyle = '#4FC3F7'; ctx.lineWidth = 3; ctx.lineCap = 'round';
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                const y = 30 + i * 30;
                ctx.moveTo(20, y);
                ctx.quadraticCurveTo(w*0.3, y - 15, w*0.5, y);
                ctx.quadraticCurveTo(w*0.7, y + 15, w - 20, y);
                ctx.stroke();
            }
            // Bent tree
            ctx.fillStyle = '#8B4513';
            ctx.save(); ctx.translate(w*0.7, h-30); ctx.rotate(-0.2);
            ctx.fillRect(-4, -60, 8, 60);
            ctx.restore();
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath(); ctx.arc(w*0.7 + 20, h - 80, 25, 0, Math.PI*2); ctx.fill();
        } else if (word === 'moon') {
            ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = 'white';
            for (let i = 0; i < 30; i++) { ctx.beginPath(); ctx.arc(Math.random()*w, Math.random()*h, 1, 0, Math.PI*2); ctx.fill(); }
            ctx.fillStyle = '#FFFACD';
            ctx.beginPath(); ctx.arc(w/2, h/2, 35, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath(); ctx.arc(w/2 + 15, h/2 - 10, 30, 0, Math.PI*2); ctx.fill();
        } else if (word === 'star') {
            ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#FFD700';
            drawStar(ctx, w/2, h/2, 35, 15, 5);
            ctx.fillStyle = 'white';
            for (let i = 0; i < 20; i++) { drawStar(ctx, Math.random()*w, Math.random()*h, 3, 1.5, 4); }
        } else if (word === 'tree') {
            ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#90EE90'; ctx.fillRect(0, h-25, w, 25);
            ctx.fillStyle = '#8B4513'; ctx.fillRect(w/2-10, h/2, 20, h/2 - 25);
            ctx.fillStyle = '#228B22';
            ctx.beginPath(); ctx.arc(w/2, h/3, 45, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#2E7D32';
            ctx.beginPath(); ctx.arc(w/2-20, h/3+10, 30, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(w/2+20, h/3+10, 30, 0, Math.PI*2); ctx.fill();
        } else if (word === 'flower') {
            ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#90EE90'; ctx.fillRect(0, h-30, w, 30);
            ctx.fillStyle = '#228B22'; ctx.fillRect(w/2-3, h/2, 6, h/2-30);
            ctx.fillStyle = '#FF69B4';
            for (let i = 0; i < 6; i++) {
                const a = (i/6)*Math.PI*2;
                ctx.beginPath(); ctx.ellipse(w/2+Math.cos(a)*18, h/2-5+Math.sin(a)*18, 14, 8, a, 0, Math.PI*2); ctx.fill();
            }
            ctx.fillStyle = '#FFD700';
            ctx.beginPath(); ctx.arc(w/2, h/2-5, 10, 0, Math.PI*2); ctx.fill();
        } else if (word === 'spring') {
            ctx.fillStyle = '#C8E6C9'; ctx.fillRect(0, 0, w, h);
            // Flowers
            const flowerColors = ['#FF69B4','#FF6347','#FFD700','#9370DB','#87CEEB'];
            for (let i = 0; i < 5; i++) {
                const fx = 60 + i*(w-120)/4, fy = h - 40;
                ctx.fillStyle = '#228B22'; ctx.fillRect(fx-2, fy-30, 4, 30);
                ctx.fillStyle = flowerColors[i];
                ctx.beginPath(); ctx.arc(fx, fy-35, 10, 0, Math.PI*2); ctx.fill();
            }
            ctx.fillStyle = '#81C784';
            ctx.beginPath(); ctx.arc(w*0.3, h*0.3, 30, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(w*0.7, h*0.35, 25, 0, Math.PI*2); ctx.fill();
        } else if (word === 'summer') {
            ctx.fillStyle = '#4FC3F7'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#FFCC02';
            ctx.beginPath(); ctx.arc(w*0.8, 40, 30, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FFE082'; ctx.fillRect(0, h*0.65, w, h*0.35);
            ctx.fillStyle = '#039BE5'; ctx.fillRect(0, h*0.4, w, h*0.25);
            // Palm tree
            ctx.fillStyle = '#795548'; ctx.fillRect(w*0.3-4, h*0.3, 8, h*0.35);
            ctx.fillStyle = '#4CAF50';
            for (let i = 0; i < 4; i++) { const a = (i/4)*Math.PI*2 - 0.5; ctx.beginPath(); ctx.ellipse(w*0.3+Math.cos(a)*20, h*0.3+Math.sin(a)*10-10, 25, 8, a, 0, Math.PI*2); ctx.fill(); }
        } else if (word === 'fall') {
            ctx.fillStyle = '#FFF3E0'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#795548'; ctx.fillRect(w/2-8, h*0.4, 16, h*0.6);
            ctx.fillStyle = '#FF8A65';
            ctx.beginPath(); ctx.arc(w/2, h*0.3, 40, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FFB74D';
            ctx.beginPath(); ctx.arc(w/2-20, h*0.35, 25, 0, Math.PI*2); ctx.fill();
            // Falling leaves
            ctx.fillStyle = '#FF7043';
            for (let i = 0; i < 6; i++) { ctx.beginPath(); ctx.ellipse(Math.random()*w, h*0.4+Math.random()*h*0.4, 5, 8, Math.random()*2, 0, Math.PI*2); ctx.fill(); }
        } else if (word === 'winter') {
            ctx.fillStyle = '#E3F2FD'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = 'white'; ctx.fillRect(0, h*0.6, w, h*0.4);
            // Snowman
            ctx.beginPath(); ctx.arc(w/2, h*0.72, 22, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(w/2, h*0.52, 16, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(w/2, h*0.38, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FF6347';
            ctx.beginPath(); ctx.moveTo(w/2, h*0.37); ctx.lineTo(w/2+12, h*0.38); ctx.lineTo(w/2, h*0.39); ctx.fill();
            ctx.fillStyle = '#2d3748';
            ctx.beginPath(); ctx.arc(w/2-4, h*0.36, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(w/2+4, h*0.36, 2, 0, Math.PI*2); ctx.fill();
            // Snowflakes
            ctx.fillStyle = '#636e72';
            for (let i = 0; i < 15; i++) { ctx.beginPath(); ctx.arc(Math.random()*w, Math.random()*h*0.6, 2+Math.random()*2, 0, Math.PI*2); ctx.fill(); }
        } else {
            drawGenericScene(ctx, w, h, word);
        }
    }

    function drawCloud(ctx, x, y, size) {
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.arc(x + size * 0.6, y - size * 0.2, size * 0.7, 0, Math.PI * 2);
        ctx.arc(x + size * 1.2, y, size * 0.8, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawStar(ctx, cx, cy, outerR, innerR, points) {
        ctx.beginPath();
        for (let i = 0; i < points * 2; i++) {
            const r = i % 2 === 0 ? outerR : innerR;
            const angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
            if (i === 0) ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
            else ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
        }
        ctx.closePath();
        ctx.fill();
    }

    function drawPlaceScene(ctx, w, h, word) {
        ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#A5D6A7'; ctx.fillRect(0, h-25, w, 25);
        const cx = w/2, cy = h/2;

        if (word === 'school' || word === 'classroom') {
            ctx.fillStyle = '#FFCC80';
            ctx.fillRect(cx-60, cy-30, 120, 70);
            ctx.fillStyle = '#D32F2F';
            ctx.beginPath(); ctx.moveTo(cx-70, cy-30); ctx.lineTo(cx, cy-65); ctx.lineTo(cx+70, cy-30); ctx.fill();
            ctx.fillStyle = '#8D6E63'; ctx.fillRect(cx-10, cy+10, 20, 30);
            ctx.fillStyle = '#FFE082'; ctx.fillRect(cx-40, cy-15, 20, 20); ctx.fillRect(cx+20, cy-15, 20, 20);
        } else if (word === 'home') {
            ctx.fillStyle = '#FFAB91';
            ctx.fillRect(cx-50, cy-20, 100, 65);
            ctx.fillStyle = '#795548';
            ctx.beginPath(); ctx.moveTo(cx-60, cy-20); ctx.lineTo(cx, cy-55); ctx.lineTo(cx+60, cy-20); ctx.fill();
            ctx.fillStyle = '#5D4037'; ctx.fillRect(cx-10, cy+15, 20, 30);
            ctx.fillStyle = '#BBDEFB'; ctx.fillRect(cx-35, cy-5, 20, 20); ctx.fillRect(cx+15, cy-5, 20, 20);
            // Heart above house
            ctx.fillStyle = '#FF69B4';
            drawHeart(ctx, cx, cy-65, 12);
        } else if (word === 'zoo') {
            ctx.fillStyle = '#8D6E63'; ctx.fillRect(cx-70, cy-40, 10, 80); ctx.fillRect(cx+60, cy-40, 10, 80);
            ctx.fillStyle = '#4E342E'; ctx.fillRect(cx-75, cy-50, 150, 15);
            ctx.fillStyle = '#FFD700'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('ZOO', cx, cy-40); ctx.textAlign = 'start';
            // Animal silhouettes
            ctx.fillStyle = '#808080';
            ctx.beginPath(); ctx.ellipse(cx-20, cy+15, 20, 15, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FFD700';
            ctx.beginPath(); ctx.arc(cx+25, cy+10, 15, 0, Math.PI*2); ctx.fill();
        } else if (word === 'park') {
            ctx.fillStyle = '#66BB6A'; ctx.fillRect(0, h*0.5, w, h*0.5);
            // Trees
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath(); ctx.arc(w*0.2, h*0.4, 25, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(w*0.8, h*0.35, 30, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#795548';
            ctx.fillRect(w*0.2-4, h*0.45, 8, 25); ctx.fillRect(w*0.8-4, h*0.42, 8, 28);
            // Bench
            ctx.fillStyle = '#8D6E63';
            ctx.fillRect(cx-25, cy+15, 50, 5); ctx.fillRect(cx-25, cy+15, 5, 20); ctx.fillRect(cx+20, cy+15, 5, 20);
        } else if (word === 'library') {
            ctx.fillStyle = '#E0E0E0'; ctx.fillRect(cx-60, cy-30, 120, 70);
            ctx.fillStyle = '#5D4037'; ctx.fillRect(cx-5, cy+10, 10, 30);
            // Books on shelves
            const bookColors = ['#F44336','#2196F3','#4CAF50','#FF9800','#9C27B0'];
            for (let row = 0; row < 2; row++) {
                for (let i = 0; i < 5; i++) {
                    ctx.fillStyle = bookColors[i];
                    ctx.fillRect(cx-45+i*14, cy-20+row*22, 10, 18);
                }
            }
        } else if (word === 'hospital') {
            ctx.fillStyle = 'white'; ctx.fillRect(cx-60, cy-30, 120, 70);
            ctx.strokeStyle = '#E0E0E0'; ctx.lineWidth = 1; ctx.strokeRect(cx-60, cy-30, 120, 70);
            ctx.fillStyle = '#F44336';
            ctx.fillRect(cx-4, cy-20, 8, 24); ctx.fillRect(cx-12, cy-12, 24, 8);
            ctx.fillStyle = '#90CAF9';
            for (let i = 0; i < 4; i++) ctx.fillRect(cx-40+i*25, cy+10, 12, 15);
        } else if (word === 'restaurant') {
            ctx.fillStyle = '#FFCC80'; ctx.fillRect(cx-55, cy-25, 110, 65);
            ctx.fillStyle = '#FF7043';
            ctx.fillRect(cx-60, cy-30, 120, 10);
            ctx.fillStyle = '#5D4037'; ctx.fillRect(cx-8, cy+10, 16, 30);
            // Fork and knife sign
            ctx.strokeStyle = '#FFF'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(cx-10, cy-18); ctx.lineTo(cx-10, cy-5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx+10, cy-18); ctx.lineTo(cx+10, cy-5); ctx.stroke();
        } else {
            drawGenericScene(ctx, w, h, word);
        }
    }

    function drawHeart(ctx, x, y, size) {
        ctx.beginPath();
        ctx.moveTo(x, y + size / 4);
        ctx.bezierCurveTo(x, y, x - size / 2, y, x - size / 2, y + size / 4);
        ctx.bezierCurveTo(x - size / 2, y + size / 2, x, y + size * 0.75, x, y + size);
        ctx.bezierCurveTo(x, y + size * 0.75, x + size / 2, y + size / 2, x + size / 2, y + size / 4);
        ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + size / 4);
        ctx.fill();
    }

    function drawNumberScene(ctx, w, h, word) {
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#E8EAF6');
        grad.addColorStop(1, '#C5CAE9');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        const numMap = { 'one':1,'two':2,'three':3,'four':4,'five':5,'six':6,'seven':7,'eight':8,'nine':9,'ten':10,'eleven':11,'twelve':12,
            'thirteen':13,'fourteen':14,'fifteen':15,'sixteen':16,'seventeen':17,'eighteen':18,'nineteen':19,'twenty':20,
            'thirty':30,'forty':40,'fifty':50,'sixty':60,'seventy':70,'eighty':80,'ninety':90,'hundred':100,'some':'?' };
        const num = numMap[word] || word;

        ctx.fillStyle = '#3F51B5';
        ctx.font = 'bold 72px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(String(num), w/2, h/2 + 20);

        // Draw dots for small numbers
        if (typeof num === 'number' && num <= 12) {
            ctx.fillStyle = '#FF7043';
            const cols = Math.min(num, 6);
            const rows = Math.ceil(num / 6);
            for (let i = 0; i < num; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                ctx.beginPath();
                ctx.arc(w/2 - (cols-1)*12 + col*24, h*0.75 + row*20, 6, 0, Math.PI*2);
                ctx.fill();
            }
        }
        ctx.textAlign = 'start';
    }

    function drawTimeScene(ctx, w, h, word) {
        ctx.fillStyle = '#FFF8E1'; ctx.fillRect(0, 0, w, h);
        const cx = w/2, cy = h/2;

        if (word.includes('day') && word !== 'day' && word !== 'today') {
            // Calendar
            ctx.fillStyle = 'white'; ctx.strokeStyle = '#E0E0E0'; ctx.lineWidth = 2;
            ctx.fillRect(cx-50, cy-40, 100, 80); ctx.strokeRect(cx-50, cy-40, 100, 80);
            ctx.fillStyle = '#F44336'; ctx.fillRect(cx-50, cy-40, 100, 20);
            ctx.fillStyle = 'white'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(word.toUpperCase(), cx, cy-25);
            ctx.fillStyle = '#2d3748'; ctx.font = 'bold 32px sans-serif';
            const dayNum = {'Sunday':'日','Monday':'一','Tuesday':'二','Wednesday':'三','Thursday':'四','Friday':'五','Saturday':'六'};
            ctx.fillText(dayNum[word] || '?', cx, cy + 20);
            ctx.textAlign = 'start';
        } else {
            // Clock
            ctx.strokeStyle = '#2d3748'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(cx, cy, 50, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(cx, cy, 48, 0, Math.PI*2); ctx.fill();
            // Numbers
            ctx.fillStyle = '#2d3748'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
            for (let i = 1; i <= 12; i++) {
                const a = (i/12)*Math.PI*2 - Math.PI/2;
                ctx.fillText(String(i), cx + Math.cos(a)*38, cy + Math.sin(a)*38 + 4);
            }
            // Hands
            ctx.strokeStyle = '#2d3748'; ctx.lineWidth = 3; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + 20, cy - 15); ctx.stroke();
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx - 5, cy - 30); ctx.stroke();
            ctx.textAlign = 'start';
        }
    }

    function drawActionScene(ctx, w, h, word) {
        ctx.fillStyle = '#F3E5F5'; ctx.fillRect(0, 0, w, h);
        const cx = w/2, cy = h/2;

        // Simple stick figure doing the action
        ctx.strokeStyle = '#4a5568'; ctx.lineWidth = 3; ctx.lineCap = 'round';

        // Head
        ctx.fillStyle = '#FFCC80';
        ctx.beginPath(); ctx.arc(cx, cy-35, 14, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#4a5568'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy-35, 14, 0, Math.PI*2); ctx.stroke();

        ctx.lineWidth = 3;
        if (word === 'jump') {
            ctx.beginPath(); ctx.moveTo(cx, cy-20); ctx.lineTo(cx, cy+5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-15, cy-10); ctx.lineTo(cx, cy-5); ctx.lineTo(cx+15, cy-10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-12, cy+25); ctx.lineTo(cx, cy+5); ctx.lineTo(cx+12, cy+25); ctx.stroke();
            // Jump arrows
            ctx.fillStyle = '#FF7043'; ctx.font = '20px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('⬆', cx, cy+50); ctx.textAlign = 'start';
        } else if (word === 'run') {
            ctx.beginPath(); ctx.moveTo(cx, cy-20); ctx.lineTo(cx+5, cy+5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-15, cy); ctx.lineTo(cx+5, cy-5); ctx.lineTo(cx+20, cy-15); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-10, cy+30); ctx.lineTo(cx+5, cy+5); ctx.lineTo(cx+20, cy+20); ctx.stroke();
            // Speed lines
            ctx.strokeStyle = '#90A4AE'; ctx.lineWidth = 1.5;
            for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.moveTo(cx-30, cy-20+i*15); ctx.lineTo(cx-50, cy-20+i*15); ctx.stroke(); }
        } else if (word === 'swim') {
            ctx.fillStyle = '#4FC3F7'; ctx.fillRect(0, h*0.4, w, h*0.6);
            ctx.strokeStyle = '#4a5568';
            ctx.beginPath(); ctx.moveTo(cx-20, cy); ctx.lineTo(cx+10, cy+5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-10, cy+15); ctx.lineTo(cx+10, cy+5); ctx.lineTo(cx+25, cy-5); ctx.stroke();
            // Waves
            ctx.strokeStyle = '#636e72'; ctx.lineWidth = 2;
            for (let y = h*0.4; y < h; y += 20) {
                ctx.beginPath();
                for (let x = 0; x < w; x += 5) ctx.lineTo(x, y + Math.sin(x*0.05)*5);
                ctx.stroke();
            }
        } else if (word === 'read') {
            ctx.beginPath(); ctx.moveTo(cx, cy-20); ctx.lineTo(cx, cy+15); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-20, cy+5); ctx.lineTo(cx, cy-5); ctx.lineTo(cx+20, cy+5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-10, cy+35); ctx.lineTo(cx, cy+15); ctx.lineTo(cx+10, cy+35); ctx.stroke();
            // Book
            ctx.fillStyle = '#4CAF50'; ctx.fillRect(cx-20, cy-5, 40, 30);
            ctx.strokeStyle = 'white'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(cx, cy-2); ctx.lineTo(cx, cy+22); ctx.stroke();
        } else if (word === 'sleep') {
            // Lying down
            ctx.beginPath(); ctx.moveTo(cx-30, cy); ctx.lineTo(cx+30, cy); ctx.stroke();
            ctx.fillStyle = '#FFCC80';
            ctx.beginPath(); ctx.arc(cx-35, cy, 12, 0, Math.PI*2); ctx.fill();
            // Z's
            ctx.fillStyle = '#9C27B0'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('Z', cx-20, cy-20); ctx.font = 'bold 20px sans-serif';
            ctx.fillText('Z', cx-5, cy-35); ctx.font = 'bold 24px sans-serif';
            ctx.fillText('Z', cx+12, cy-48);
            ctx.textAlign = 'start';
            // Bed
            ctx.fillStyle = '#8D6E63'; ctx.fillRect(cx-50, cy+5, 100, 8);
        } else if (word === 'sing') {
            ctx.beginPath(); ctx.moveTo(cx, cy-20); ctx.lineTo(cx, cy+15); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-20, cy); ctx.lineTo(cx, cy-5); ctx.lineTo(cx+20, cy); ctx.stroke();
            // Music notes
            ctx.fillStyle = '#E91E63'; ctx.font = '24px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('♪', cx+30, cy-30); ctx.fillText('♫', cx+45, cy-15); ctx.fillText('♪', cx-35, cy-25);
            ctx.textAlign = 'start';
        } else if (word === 'dance') {
            ctx.beginPath(); ctx.moveTo(cx, cy-20); ctx.lineTo(cx+5, cy+5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-20, cy-15); ctx.lineTo(cx, cy-5); ctx.lineTo(cx+25, cy-20); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-15, cy+25); ctx.lineTo(cx+5, cy+5); ctx.lineTo(cx+20, cy+30); ctx.stroke();
            // Music
            ctx.fillStyle = '#E91E63'; ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('♪ ♫ ♪', cx, h-20); ctx.textAlign = 'start';
        } else if (word === 'write') {
            ctx.beginPath(); ctx.moveTo(cx, cy-20); ctx.lineTo(cx, cy+15); ctx.stroke();
            // Pencil in hand
            ctx.fillStyle = '#FFD700'; ctx.save(); ctx.translate(cx+15, cy); ctx.rotate(0.5);
            ctx.fillRect(0, -3, 35, 6);
            ctx.fillStyle = '#FF69B4'; ctx.fillRect(30, -4, 8, 8);
            ctx.fillStyle = '#2d3748'; ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(-8, 0); ctx.lineTo(0, 3); ctx.fill();
            ctx.restore();
            // Paper
            ctx.fillStyle = 'white'; ctx.strokeStyle = '#E0E0E0'; ctx.lineWidth = 1;
            ctx.fillRect(cx-40, cy+20, 50, 40); ctx.strokeRect(cx-40, cy+20, 50, 40);
            ctx.strokeStyle = '#BDBDBD';
            for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.moveTo(cx-35, cy+30+i*10); ctx.lineTo(cx, cy+30+i*10); ctx.stroke(); }
        } else {
            // Default action - just show word big with motion lines
            ctx.fillStyle = '#7C4DFF'; ctx.font = 'bold 28px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(word.toUpperCase(), cx, cy + 10);
            ctx.strokeStyle = '#CE93D8'; ctx.lineWidth = 2;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath(); ctx.moveTo(cx - 60, cy - 30 + i*20); ctx.lineTo(cx - 80, cy - 30 + i*20); ctx.stroke();
            }
            ctx.textAlign = 'start';
        }
    }

    function drawFeelingScene(ctx, w, h, word) {
        ctx.fillStyle = '#FFF9C4'; ctx.fillRect(0, 0, w, h);
        const cx = w/2, cy = h/2;

        // Face circle
        const faceColor = {
            'happy':'#FFD700','sad':'#90CAF9','angry':'#FF5252','mad':'#FF5252',
            'excited':'#FF9800','hungry':'#FFCC80','tired':'#B39DDB','sick':'#A5D6A7',
            'big':'#E0E0E0','small':'#E0E0E0','old':'#E0E0E0','short':'#E0E0E0',
            'tall':'#E0E0E0','thin':'#E0E0E0','long':'#E0E0E0','many':'#E0E0E0',
            'much':'#E0E0E0','dirty':'#8D6E63','bad':'#EF9A9A','good':'#A5D6A7'
        }[word] || '#FFCC80';

        // Size-related adjectives
        if (['big','small','tall','short','thin','long'].includes(word)) {
            ctx.fillStyle = '#E8EAF6'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#5C6BC0';
            if (word === 'big') { ctx.beginPath(); ctx.arc(cx, cy, 55, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(cx+70, cy+20, 15, 0, Math.PI*2); ctx.fill(); }
            else if (word === 'small') { ctx.beginPath(); ctx.arc(cx, cy, 15, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#5C6BC0'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, 50, 0, Math.PI*2); ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]); }
            else if (word === 'tall') { ctx.fillRect(cx-15, cy-60, 30, 120); ctx.fillStyle = '#FFF'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('↕ tall', cx, cy+75); ctx.textAlign = 'start'; }

        ctx.textAlign = 'center';
        ctx.fillText(word, w / 2, h / 2 + 12);
        ctx.textAlign = 'start';
    }

    // ===== QUIZ MODE =====
    function renderQuiz() {
        const word = allWords[currentWordIndex];
        const allMeanings = Object.values(wordDatabase[currentGrade]).flat().map(w => w.chinese);
        let options = [word.chinese];
        while (options.length < 4) {
            const r = allMeanings[Math.floor(Math.random() * allMeanings.length)];
            if (!options.includes(r)) options.push(r);
        }
        options = shuffleArray(options);

        const card = document.getElementById('card-area');
        card.innerHTML = `
            <span class="word-counter">${currentWordIndex + 1} / ${allWords.length}</span>
            <div class="quiz-container">
                <p class="quiz-question">What does this word mean? 這個字是什麼意思？</p>
                <div class="quiz-word">${word.word} <button class="sound-btn" onclick="speakWord('${word.word.replace(/'/g, "\\'")}')">&#128264;</button></div>
                <div class="quiz-options">
                    ${options.map(opt => `
                        <div class="quiz-option" onclick="checkQuiz(this, ${opt === word.chinese})">${opt}</div>
                    `).join('')}
                </div>
                <div class="nav-buttons" style="margin-top:25px">
                    <button class="nav-btn secondary" onclick="nextWord()">Skip &#8594;</button>
                </div>
            </div>
        `;
    }

    function checkQuiz(el, correct) {
        if (document.querySelector('.quiz-option.correct,.quiz-option.wrong')) return;
        if (correct) {
            el.classList.add('correct');
            score += 10; streak++;
            learnedWords.add(allWords[currentWordIndex].word);
            updateProgress(); celebrate();
            setTimeout(nextWord, 1200);
        } else {
            el.classList.add('wrong'); streak = 0; updateProgress();
            document.querySelectorAll('.quiz-option').forEach(o => {
                if (o.textContent === allWords[currentWordIndex].chinese) o.classList.add('correct');
            });
            setTimeout(nextWord, 2000);
        }
    }

    // ===== SPELLING MODE =====
    function renderSpelling() {
        const word = allWords[currentWordIndex];
        const letters = word.word.replace(/\s/g, '').split('');
        const hasSpace = word.word.includes(' ');
        const displayWord = hasSpace ? word.word : word.word;
        const spellLetters = displayWord.split('');

        // Show first letter as hint
        const hints = [0];
        if (spellLetters.length > 5) hints.push(spellLetters.length - 1);

        const card = document.getElementById('card-area');
        card.innerHTML = `
            <span class="word-counter">${currentWordIndex + 1} / ${allWords.length}</span>
            <div class="spelling-container">
                <div class="spelling-hint">${word.chinese}</div>
                <button class="sound-btn" onclick="speakWord('${word.word.replace(/'/g, "\\'")}')">&#128264;</button>
                <p style="color:#718096;margin:10px 0;font-size:0.9em;">Listen and spell the word:</p>
                <div class="spelling-input-area" id="spelling-area">
                    ${spellLetters.map((letter, i) => {
                        if (letter === ' ') return `<div style="width:20px" data-index="${i}"></div>`;
                        const isHint = hints.includes(i);
                        return `<input type="text" maxlength="1" class="spell-letter-input ${isHint ? 'hint' : ''}"
                            data-index="${i}" data-letter="${letter}"
                            value="${isHint ? letter : ''}"
                            ${isHint ? 'readonly' : ''}
                            oninput="handleSpellInput(this, ${i}, ${spellLetters.length})"
                            onkeydown="handleSpellKey(event, ${i}, ${spellLetters.length})">`;
                    }).join('')}
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn secondary" onclick="revealSpelling()">Show Answer</button>
                    <button class="nav-btn primary" onclick="checkSpelling()">Check &#10003;</button>
                    <button class="nav-btn secondary" onclick="nextWord()">Skip &#8594;</button>
                </div>
            </div>
        `;
        setTimeout(() => {
            const first = document.querySelector('.spell-letter-input:not(.hint)');
            if (first) first.focus();
        }, 100);
    }

    function handleSpellInput(input, idx, total) {
        if (input.value.length === 1) {
            for (let i = idx + 1; i < total; i++) {
                const next = document.querySelector(`input[data-index="${i}"]`);
                if (next && !next.classList.contains('hint')) { next.focus(); break; }
            }
        }
    }

    function handleSpellKey(e, idx, total) {
        if (e.key === 'Backspace' && !e.target.value) {
            for (let i = idx - 1; i >= 0; i--) {
                const prev = document.querySelector(`input[data-index="${i}"]`);
                if (prev && !prev.classList.contains('hint')) { prev.focus(); break; }
            }
        }
        if (e.key === 'Enter') checkSpelling();
    }

    function checkSpelling() {
        const inputs = document.querySelectorAll('.spell-letter-input');
        let allCorrect = true;
        inputs.forEach(input => {
            if (input.value.toLowerCase() === input.dataset.letter.toLowerCase()) {
                input.classList.add('correct'); input.classList.remove('wrong');
            } else {
                input.classList.add('wrong'); input.classList.remove('correct'); allCorrect = false;
            }
        });
        if (allCorrect) {
            score += 15; streak++;
            learnedWords.add(allWords[currentWordIndex].word);
            updateProgress(); celebrate();
            setTimeout(nextWord, 1200);
        } else { streak = 0; updateProgress(); }
    }

    function revealSpelling() {
        document.querySelectorAll('.spell-letter-input').forEach(input => {
            input.value = input.dataset.letter;
            input.classList.add('correct');
        });
    }

    // ===== MATCHING MODE =====
    let matchState = { selected: null, matched: [], words: [] };

    function renderMatching() {
        const words = shuffleArray([...allWords]).slice(0, Math.min(5, allWords.length));
        matchState = { selected: null, matched: [], words };
        const shuffledMeanings = shuffleArray(words.map((w, i) => ({ chinese: w.chinese, index: i })));

        const card = document.getElementById('card-area');
        card.innerHTML = `
            <div class="matching-container">
                <p style="text-align:center;color:#4a5568;margin-bottom:15px;font-size:1.05em;">Match the word with its meaning!</p>
                <div class="matching-grid">
                    <div class="matching-column">
                        <h3>Words</h3>
                        ${words.map((w, i) => `<div class="match-item word-item" data-type="word" data-index="${i}" onclick="handleMatch(this)">${w.word}</div>`).join('')}
                    </div>
                    <div class="matching-column">
                        <h3>中文</h3>
                        ${shuffledMeanings.map(m => `<div class="match-item" data-type="meaning" data-index="${m.index}" onclick="handleMatch(this)">${m.chinese}</div>`).join('')}
                    </div>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn primary" onclick="renderMatching()">New Set</button>
                </div>
            </div>
        `;
    }

    function handleMatch(el) {
        if (el.classList.contains('matched')) return;
        const type = el.dataset.type;
        const index = parseInt(el.dataset.index);

        if (!matchState.selected) {
            matchState.selected = { el, type, index };
            el.classList.add('selected');
        } else {
            if (matchState.selected.type === type) {
                matchState.selected.el.classList.remove('selected');
                matchState.selected = { el, type, index };
                el.classList.add('selected');
            } else {
                if (matchState.selected.index === index) {
                    el.classList.add('matched');
                    matchState.selected.el.classList.add('matched');
                    matchState.selected.el.classList.remove('selected');
                    matchState.matched.push(index);
                    score += 5; streak++;
                    if (matchState.matched.length === matchState.words.length) celebrate();
                } else {
                    el.classList.add('wrong-match');
                    matchState.selected.el.classList.add('wrong-match');
                    matchState.selected.el.classList.remove('selected');
                    streak = 0;
                    setTimeout(() => document.querySelectorAll('.wrong-match').forEach(e => e.classList.remove('wrong-match')), 500);
                }
                matchState.selected = null;
                updateProgress();
            }
        }
    }

    // ===== UTILITIES =====
    function speakWord(word) {
        if ('speechSynthesis' in window) {
            const u = new SpeechSynthesisUtterance(word);
            u.rate = 0.75; u.pitch = 1;
            speechSynthesis.speak(u);
        }
    }

    function nextWord() { currentWordIndex = (currentWordIndex + 1) % allWords.length; render(); }
    function prevWord() { currentWordIndex = (currentWordIndex - 1 + allWords.length) % allWords.length; render(); }

    function markLearned() {
        learnedWords.add(allWords[currentWordIndex].word);
        score += 5; updateProgress(); celebrate();
        setTimeout(nextWord, 600);
    }

    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function celebrate() {
        const container = document.getElementById('celebration');
        container.innerHTML = '';
        const colors = ['#FF6347', '#FFD700', '#32CD32', '#4169E1', '#FF69B4', '#9370DB'];
        for (let i = 0; i < 25; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + '%';
            c.style.top = '-10px';
            c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            c.style.animationDelay = Math.random() * 0.4 + 's';
            c.style.width = (5 + Math.random() * 8) + 'px';
            c.style.height = (5 + Math.random() * 8) + 'px';
            container.appendChild(c);
        }
        setTimeout(() => container.innerHTML = '', 2500);
    }

    // Start
    init();
    </script>
</body>
</html>
